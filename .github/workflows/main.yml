name: Build WDSigEx

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish WDSigEx
        working-directory: ./src
        run: dotnet publish WDSigEx.csproj -p:PublishProfile=FolderProfile

      - name: Collect snapshot files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Package\Application | Out-Null

          $publishedExe = "src\bin\Release\net10.0-windows\publish\win-x64\WDSigEx.exe"

          if (!(Test-Path $publishedExe)) {
            throw "WDSigEx.exe not found at $publishedExe"
          }

          Copy-Item $publishedExe "Package\Application\WDSigEx.exe" -Force

      - name: Upload WDSigEx snapshot
        uses: actions/upload-artifact@v6
        with:
          name: wdsigex_snapshot.zip
          path: Package\Application\*
